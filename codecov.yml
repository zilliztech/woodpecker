codecov:
  require_ci_to_pass: true

coverage:
  status:
    project:
      default:
        target: auto
        threshold: 1%
    patch:
      default:
        target: 80%
        threshold: 1%

ignore:
  - "tests/**"
  - "mocks/**"
  - "proto/**"
  - "**/*_mock.go"
  - "**/*_test.go"
  - "**/*.pb.go"
  - "**/*_vtproto.pb.go"

comment:
  layout: "reach,diff,flags,files"
  behavior: default
  require_changes: true
