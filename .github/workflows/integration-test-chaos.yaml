name: Chaos Test

on:
  pull_request:
    branches:
      - master
      - dev
    paths:
      - "**.go"
      - "go.mod"
      - "go.sum"
      - "config/**"
      - "deployments/**"
      - "build/**"
      - "tests/docker/**"
      - ".github/workflows/integration-test-chaos.yaml"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  Chaos-Test:
    name: Chaos Test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Build Docker image
        run: ./build/build_image.sh ubuntu22.04 amd64 -t woodpecker:latest

      - name: Start chaos test cluster
        run: |
          cd tests/docker/chaos
          SCRIPT_DIR="$(pwd)"
          source ../common.sh
          OVERRIDE_FILE="$SCRIPT_DIR/docker-compose.chaos.yaml"
          PROJECT_NAME="woodpecker-chaos"
          CONTAINERS="etcd minio woodpecker-node1 woodpecker-node2 woodpecker-node3 woodpecker-node4"
          compose_cmd up -d
          echo "Waiting for containers..."
          wait_for_containers
          echo "Waiting for gossip convergence..."
          sleep 15
          echo "Cluster is ready"

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@latest

      - name: Run chaos tests
        run: |
          cd tests/docker/chaos
          set +e
          gotestsum --format pkgname-and-test-fails \
            --jsonfile test-output.json \
            -- -race -timeout 900s -count=1 ./...
          exit_code=$?
          echo ""
          echo "=== Test Results ==="
          jq -r 'select(.Test != null and .Elapsed != null) | select(.Action == "pass" or .Action == "fail") | (if .Action == "fail" then "FAIL" else "PASS" end) + " " + .Test + " (" + (.Elapsed | tostring) + "s)"' test-output.json
          exit $exit_code

      - name: Collect container logs on failure
        if: failure()
        run: |
          mkdir -p tests/docker/chaos/logs
          for container in etcd minio woodpecker-node1 woodpecker-node2 woodpecker-node3 woodpecker-node4; do
            docker logs "$container" > "tests/docker/chaos/logs/${container}.log" 2>&1 || true
          done

      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: chaos-test-logs
          path: |
            tests/docker/chaos/test-output.json
            tests/docker/chaos/logs/
          retention-days: 7
          if-no-files-found: ignore

      - name: Handle failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR=${{ github.event.pull_request.number }}
          gh pr comment $PR --body "❌ **Chaos Test** failed. Comment \`/rerun-chaos-test\` to rerun, or \`/rerun\` to rerun all failed checks."
          gh pr edit $PR --remove-label "ci-passed" 2>/dev/null || true

      - name: Add ci-passed label
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR=${{ github.event.pull_request.number }}
          SELF="${{ github.workflow }}"
          REQUIRED_CHECKS=("Lint" "Go Mod Tidy Check" "Unit Test" "E2E Local" "E2E Object Storage" "E2E Service" "Component Integration Test" "Chaos Test")
          CHECKS=$(gh pr checks $PR --json name,bucket 2>/dev/null || echo "[]")
          ALL_PASSED=true
          for check in "${REQUIRED_CHECKS[@]}"; do
            [ "$check" = "$SELF" ] && continue
            bucket=$(echo "$CHECKS" | jq -r --arg n "$check" '.[] | select(.name == $n) | .bucket' | head -1)
            if [ "$bucket" != "pass" ]; then
              ALL_PASSED=false
              break
            fi
          done
          if [ "$ALL_PASSED" = true ]; then
            gh pr edit $PR --add-label "ci-passed"
          fi

      - name: Stop cluster
        if: always()
        run: |
          cd tests/docker/chaos
          DEPLOYMENTS_DIR="$(cd ../../.. && pwd)/deployments"
          docker compose -f "$DEPLOYMENTS_DIR/docker-compose.yaml" \
            -f docker-compose.chaos.yaml \
            -p woodpecker-chaos down -v 2>/dev/null || true

