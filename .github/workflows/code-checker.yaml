name: Code Checker

on:
  pull_request:
    branches:
      - master
      - dev
    paths:
      - "**.go"
      - "go.mod"
      - "go.sum"
      - ".golangci.yml"
      - ".github/workflows/code-checker.yaml"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --config .golangci.yml --timeout=10m

      - name: Handle failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR=${{ github.event.pull_request.number }}
          gh pr comment $PR --body "❌ **Lint** failed. Comment \`/rerun-lint\` to rerun, or \`/rerun\` to rerun all failed checks."
          gh pr edit $PR --remove-label "ci-passed" 2>/dev/null || true

      - name: Add ci-passed label
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR=${{ github.event.pull_request.number }}
          SELF="Lint"
          REQUIRED_CHECKS=("Lint" "Go Mod Tidy Check" "Unit Test" "E2E Local" "E2E Object Storage" "E2E Service" "Component Integration Test")
          CHECKS=$(gh pr checks $PR --json name,bucket 2>/dev/null || echo "[]")
          ALL_PASSED=true
          for check in "${REQUIRED_CHECKS[@]}"; do
            [ "$check" = "$SELF" ] && continue
            bucket=$(echo "$CHECKS" | jq -r --arg n "$check" '.[] | select(.name == $n) | .bucket' | head -1)
            if [ "$bucket" != "pass" ]; then
              ALL_PASSED=false
              break
            fi
          done
          if [ "$ALL_PASSED" = true ]; then
            gh pr edit $PR --add-label "ci-passed"
          fi

  mod-tidy-check:
    name: Go Mod Tidy Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Check go mod tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum || (echo "go.mod or go.sum is not tidy. Run 'go mod tidy' and commit the changes." && exit 1)

      - name: Handle failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR=${{ github.event.pull_request.number }}
          gh pr comment $PR --body "❌ **Go Mod Tidy Check** failed. Comment \`/rerun-mod-tidy\` to rerun, or \`/rerun\` to rerun all failed checks."
          gh pr edit $PR --remove-label "ci-passed" 2>/dev/null || true

      - name: Add ci-passed label
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR=${{ github.event.pull_request.number }}
          SELF="Go Mod Tidy Check"
          REQUIRED_CHECKS=("Lint" "Go Mod Tidy Check" "Unit Test" "E2E Local" "E2E Object Storage" "E2E Service" "Component Integration Test")
          CHECKS=$(gh pr checks $PR --json name,bucket 2>/dev/null || echo "[]")
          ALL_PASSED=true
          for check in "${REQUIRED_CHECKS[@]}"; do
            [ "$check" = "$SELF" ] && continue
            bucket=$(echo "$CHECKS" | jq -r --arg n "$check" '.[] | select(.name == $n) | .bucket' | head -1)
            if [ "$bucket" != "pass" ]; then
              ALL_PASSED=false
              break
            fi
          done
          if [ "$ALL_PASSED" = true ]; then
            gh pr edit $PR --add-label "ci-passed"
          fi
