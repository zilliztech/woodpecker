name: E2E Object Storage

on:
  pull_request:
    branches:
      - master
      - dev
    paths:
      - "**.go"
      - "go.mod"
      - "go.sum"
      - "config/**"
      - ".github/workflows/integration-test-e2e-objectstorage.yaml"
      - ".github/docker-compose-ci.yaml"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  E2E-Object-Storage:
    name: E2E Object Storage
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Start dependencies (etcd + MinIO)
        run: |
          docker compose -f .github/docker-compose-ci.yaml up -d
          echo "Waiting for etcd..."
          until docker inspect --format='{{.State.Health.Status}}' ci-etcd 2>/dev/null | grep -q healthy; do
            sleep 2
          done
          echo "etcd is ready"
          echo "Waiting for MinIO..."
          until docker inspect --format='{{.State.Health.Status}}' ci-minio 2>/dev/null | grep -q healthy; do
            sleep 2
          done
          echo "MinIO is ready"

      - name: Create MinIO bucket
        run: |
          wget -q https://dl.min.io/client/mc/release/linux-amd64/mc -O /usr/local/bin/mc
          chmod +x /usr/local/bin/mc
          mc alias set local http://localhost:9000 minioadmin minioadmin
          mc mb local/a-bucket --ignore-existing

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@latest

      - name: Run e2e object storage tests
        run: |
          E2E_TESTS="TestOpenWriter|TestOpenInternal|TestRepeated|TestWriterClose|TestClientRecreation|TestMultiClient|TestConcurrentWriteAnd|TestConcurrentReader|TestReadTheWritten|TestReadWriteLoop|TestMultiAppendSync|TestTailRead|TestConcurrentWriteWith|TestTruncate|TestWriteAndTruncate|TestMultiSegment|TestReadBefore|TestSegmentCleanup"
          set +e
          gotestsum --format pkgname-and-test-fails \
            --jsonfile test-output.json \
            -- -race -cover -failfast -timeout=20m \
            -run "^(${E2E_TESTS})/ObjectStorage$" \
            ./tests/integration/...
          exit_code=$?
          echo ""
          echo "=== Test Results ==="
          jq -r 'select(.Test != null and .Elapsed != null) | select(.Action == "pass" or .Action == "fail") | (if .Action == "fail" then "FAIL" else "PASS" end) + " " + .Test + " (" + (.Elapsed | tostring) + "s)"' test-output.json
          exit $exit_code

      - name: Upload test output on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-logs-e2e-objectstorage
          path: test-output.json
          retention-days: 7
          if-no-files-found: ignore

      - name: Stop dependencies
        if: always()
        run: |
          docker compose -f .github/docker-compose-ci.yaml down -v
