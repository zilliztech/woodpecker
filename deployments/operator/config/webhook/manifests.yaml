---
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: mutating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /mutate-woodpecker-zilliz-io-v1alpha1-woodpeckercluster
  failurePolicy: Fail
  name: mwoodpeckercluster-v1alpha1.kb.io
  rules:
  - apiGroups:
    - woodpecker.zilliz.io
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - woodpeckerclusters
  sideEffects: None
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: validating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-woodpecker-zilliz-io-v1alpha1-woodpeckercluster
  failurePolicy: Fail
  name: vwoodpeckercluster-v1alpha1.kb.io
  rules:
  - apiGroups:
    - woodpecker.zilliz.io
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - woodpeckerclusters
  sideEffects: None
