# Deploy a WoodpeckerCluster with AWS S3 as object storage using IRSA.
#
# Prerequisites:
#   1. EKS cluster with OIDC provider enabled
#   2. IAM role with S3 permissions, trust policy allowing this SA to assume it
#   3. Replace all <parameters> below with your actual values
#
# If you already have a ServiceAccount with the IRSA annotation, skip the
# ServiceAccount resource and set serviceAccountName in the CR directly.

# Resource 1: ConfigMap with Woodpecker configuration (S3 backend)
apiVersion: v1
kind: ConfigMap
metadata:
  name: woodpecker-config
data:
  woodpecker.yaml: |
    woodpecker:
      meta:
        type: etcd
      client:
        quorum:
          replicaCount: 3
      storage:
        type: service
        rootPath: /woodpecker/data
      logstore:
        segmentSyncPolicy:
          syncInterval: 1000
          syncMaxBytes: 4194304
    log:
      level: info
      format: json
      stdout: true
    etcd:
      endpoints:
        - <etcd-endpoint>:2379
      rootPath: by-dev
    minio:
      address: s3.<my-bucket-region>.amazonaws.com
      port: 443
      useSSL: true
      useIAM: true
      bucketName: <my-bucket-name>
      rootPath: woodpecker
---
# Resource 2: ServiceAccount with IRSA annotation
apiVersion: v1
kind: ServiceAccount
metadata:
  name: woodpecker-sa
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::<ACCOUNT_ID>:role/<ROLE_NAME>
---
# Resource 3: WoodpeckerCluster referencing the SA
apiVersion: woodpecker.zilliz.io/v1alpha1
kind: WoodpeckerCluster
metadata:
  name: woodpecker-sample
spec:
  image: zilliztech/woodpecker:v0.1.26
  replicas: 3
  serviceAccountName: woodpecker-sa
  resources:
    requests:
      cpu: "500m"
      memory: "512Mi"
    limits:
      cpu: "1"
      memory: "1Gi"
  storageSize: 10Gi
  servicePort: 18080
  gossipPort: 17946
  metricsPort: 9091
  configRef:
    name: woodpecker-config
