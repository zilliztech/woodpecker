# Deploy a WoodpeckerCluster with Azure Blob Storage using AKS Workload Identity.
#
# Prerequisites:
#   1. AKS cluster with Workload Identity enabled (OIDC issuer + workload identity addon)
#   2. Azure managed identity or app registration with Storage Blob Data Contributor role
#   3. Federated credential configured for this K8s SA:
#        az identity federated-credential create \
#          --name woodpecker-fed-cred \
#          --identity-name <MANAGED_IDENTITY_NAME> \
#          --resource-group <RESOURCE_GROUP> \
#          --issuer <AKS_OIDC_ISSUER_URL> \
#          --subject system:serviceaccount:<K8S_NAMESPACE>:woodpecker-sa
#   4. Replace all <parameters> below with your actual values
#
# If you already have a ServiceAccount with the Workload Identity annotation,
# skip the ServiceAccount resource and set serviceAccountName in the CR directly.

# Resource 1: ConfigMap with Woodpecker configuration (Azure Blob backend)
apiVersion: v1
kind: ConfigMap
metadata:
  name: woodpecker-config
data:
  woodpecker.yaml: |
    woodpecker:
      meta:
        type: etcd
      client:
        quorum:
          replicaCount: 3
      storage:
        type: service
        rootPath: /woodpecker/data
      logstore:
        segmentSyncPolicy:
          syncInterval: 1000
          syncMaxBytes: 4194304
    log:
      level: info
      format: json
      stdout: true
    etcd:
      endpoints:
        - <etcd-endpoint>:2379
      rootPath: by-dev
    minio:
      cloudProvider: azure
      address: core.windows.net
      port: 443
      useSSL: true
      useIAM: true
      accessKeyID: <my-storage-account>
      bucketName: <my-container-name>
      rootPath: woodpecker
---
# Resource 2: ServiceAccount with Azure Workload Identity annotation
apiVersion: v1
kind: ServiceAccount
metadata:
  name: woodpecker-sa
  annotations:
    azure.workload.identity/client-id: <CLIENT_ID>
---
# Resource 3: WoodpeckerCluster referencing the SA
# Note: Azure Workload Identity requires the pod label azure.workload.identity/use: "true"
apiVersion: woodpecker.zilliz.io/v1alpha1
kind: WoodpeckerCluster
metadata:
  name: woodpecker-sample
spec:
  image: zilliztech/woodpecker:v0.1.26
  replicas: 3
  serviceAccountName: woodpecker-sa
  podLabels:
    azure.workload.identity/use: "true"
  resources:
    requests:
      cpu: "500m"
      memory: "512Mi"
    limits:
      cpu: "1"
      memory: "1Gi"
  storageSize: 10Gi
  servicePort: 18080
  gossipPort: 17946
  metricsPort: 9091
  configRef:
    name: woodpecker-config
